<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- phosphor screen background -->
  <rect width="32" height="32" rx="3" fill="#04060a"/>
  <!-- bezel keyline -->
  <rect x="2.5" y="2.5" width="27" height="27" rx="2" fill="none" stroke="#3cff7a" stroke-width="1.2"/>
  <!-- monogram Y for Yuma, pixel-block style -->
  <g fill="#3cff7a">
    <rect x="8"  y="9"  width="3" height="3"/>
    <rect x="11" y="12" width="3" height="3"/>
    <rect x="14" y="15" width="4" height="3"/>
    <rect x="18" y="12" width="3" height="3"/>
    <rect x="21" y="9"  width="3" height="3"/>
    <rect x="14" y="18" width="4" height="3"/>
    <rect x="14" y="21" width="4" height="2"/>
  </g>
  <!-- catch-light highlight on the top-left bezel -->
  <path d="M3 4 L3 12" stroke="#b6ffce" stroke-width="1.2" fill="none" opacity=".7"/>
</svg>
