name: Repository checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Run integrity check
        run: python3 tools/selfcheck.py

  browser-smoke:
    needs: selfcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install pinned test tools
        run: npm ci
      - name: Install Chromium test engine
        run: npx playwright install --with-deps chromium
      - name: Run deterministic browser journeys
        run: npm run test:browser
